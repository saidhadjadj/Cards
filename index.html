<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Holiday Flip Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1 class="title">🎄 Holiday Greetings</h1>
    <p class="subtitle">Hover or tap the card</p>

    <div class="scene">
<div class="card">

  <!-- FRONT -->
  <div class="card__face card__face--front">
    <img src="assets/happy-new-year.jpg" alt="">
    <div class="overlay">
      <h2>🎉 Happy New Year 2026</h2>
    </div>
  </div>

  <!-- BACK -->
  <div class="card__face card__face--back">
    <img src="assets/merry-christmas.jpg" alt="">
    <div class="overlay">
      <h2>🎄 Merry Christmas</h2>
    </div>
  </div>

</div>

  <div class="snow"></div>

</body>

</html>
